<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typewriter</title>

<style>
  body {
    margin: 0;
    background: #1e1e1e;
    color: #f5f5f5;
    font-family: Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    padding: 10px;
    background: #2a2a2a;
    display: flex;
    gap: 10px;
    align-items: center;
    transition: opacity 0.3s ease;
  }

  body.focus .toolbar {
    opacity: 0;
    pointer-events: none;
  }

  input {
    padding: 6px;
    font-size: 14px;
    border: none;
    border-radius: 4px;
  }

  button {
    padding: 8px 12px;
    font-size: 14px;
    border: none;
    border-radius: 4px;
    background: #4caf50;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }

  .status {
    margin-left: auto;
    font-size: 12px;
    opacity: 0.7;
  }

  .editor-container {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
  }

  textarea {
    width: 700px;
    max-width: 90%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: inherit;

    font-size: 18px;
    line-height: 1.6;

    /* typewriter feel */
    padding: 50vh 40px;

    /* disable browser writing helpers */
    spellcheck: false;
    -webkit-grammar: false;
    -webkit-spellcheck: false;
  }
</style>
</head>

<body>

<div class="toolbar">
  <input id="filename" placeholder="filename.txt" />
  <button onclick="saveFile()">Save</button>
  <button onclick="toggleFocus()">Focus</button>
  <span class="status" id="status">Saved</span>
</div>

<div class="editor-container">
  <textarea 
    id="editor" 
    spellcheck="false"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    placeholder="Start typing..."
  ></textarea>
</div>

<script>
const editor = document.getElementById("editor");
const status = document.getElementById("status");

// Load saved text
editor.value = localStorage.getItem("typewriter-content") || "";

// Autosave
editor.addEventListener("input", () => {
  localStorage.setItem("typewriter-content", editor.value);

  status.textContent = "Saving...";
  setTimeout(() => {
    status.textContent = "Saved";
  }, 300);
});

// Save file
function saveFile() {
  const text = editor.value;
  const filename = document.getElementById("filename").value || "document.txt";

  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// Focus mode toggle
function toggleFocus() {
  document.body.classList.toggle("focus");
}
</script>

</body>
</html>
