<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typewriter App</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: monospace;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 85vh;
      font-size: 18px;
      padding: 15px;
      border: 1px solid #ccc;
      outline: none;
      resize: none;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    button {
      padding: 6px 12px;
      font-family: monospace;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="toolbar">
      <button onclick="downloadText()">Download</button>
    </div>

    <textarea id="editor" placeholder="Start typing..." autofocus></textarea>
  </div>

  <script>
    const editor = document.getElementById("editor");

    window.onload = function () {
      editor.focus();
      window.scrollTo(0, 0);
    };

    function downloadText() {
      const text = editor.value;
      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "my-writing.txt";
      a.click();

      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
