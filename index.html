<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Writing App</title>

<!-- PWA manifest (IMPORTANT STEP 2) -->
<link rel="manifest" href="manifest.json">

<style>
  body {
    margin: 0;
    background: #1e1e1e;
    color: #f5f5f5;
    font-family: Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .toolbar {
    padding: 8px;
    background: #2a2a2a;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  

  input {
    padding: 6px;
    font-size: 14px;
    border: none;
    border-radius: 4px;
  }

  button {
    padding: 8px 12px;
    font-size: 14px;
    border: none;
    border-radius: 4px;
    background: #4caf50;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }

  .status {
    margin-left: auto;
    font-size: 12px;
    opacity: 0.7;
  }

  textarea {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: inherit;

    font-size: 20px;
    line-height: 1.7;
    padding: 40px;

    caret-color: white;
  }

  /* ✨ Start typing overlay */
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3);
    font-size: 26px;
    pointer-events: none;
    animation: blink 1.2s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.2; }
  }

  /* 🖨 Print mode */
  @media print {
    .toolbar, #overlay {
      display: none;
    }

    textarea {
      padding: 1in;
      font-size: 12pt;
      background: white;
      color: black;
    }

    body {
      background: white;
    }
  }
</style>
</head>

<body>

<!-- Overlay prompt -->
<div id="overlay">Start typing...</div>

<!-- Toolbar (download + status only for kiosk simplicity) -->
<div class="toolbar">
  <input id="filename" placeholder="filename.txt" />
  <button id="downloadBtn">Download</button>
  <span class="status" id="status">Saved</span>
</div>

<!-- Writing area -->
<textarea id="editor" spellcheck="false"></textarea>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
