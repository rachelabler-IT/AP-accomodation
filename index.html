<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typewriter App</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: monospace;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 85vh;
      font-size: 18px;
      padding: 15px;
      border: 1px solid #ccc;
      outline: none;
      resize: none;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    button {
      padding: 6px 12px;
      font-family: monospace;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="toolbar">
      <button onclick="saveText()">Save</button>
    </div>

    <textarea id="editor" placeholder="Start typing..." autofocus></textarea>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const STORAGE_KEY = "typewriter_text";

    // Load saved text
    window.onload = function () {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        editor.value = saved;
      }

      editor.focus();
      window.scrollTo(0, 0);
    };

    // Auto-save as you type
    editor.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, editor.value);
    });

    // Manual save button
    function saveText() {
      localStorage.setItem(STORAGE_KEY, editor.value);
      alert("Saved!");
    }
  </script>
</body>
</html>
