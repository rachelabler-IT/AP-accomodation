<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typewriter App</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: monospace;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 85vh;
      font-size: 18px;
      padding: 15px;
      border: 1px solid #ccc;
      outline: none;
      resize: none;

      /* disables browser spell/grammar UI */
      spellcheck: false;
    }
  </style>
</head>

<body>
  <div class="container">
    <textarea id="editor" autofocus></textarea>
  </div>

  <script>
    const editor = document.getElementById("editor");

    // Ensure cursor starts at top (not middle of page or scrolled)
    window.onload = function () {
      editor.focus();
      editor.setSelectionRange(0, 0);
      window.scrollTo(0, 0);
    };

    // Prevent any accidental scroll jumping
    editor.addEventListener("focus", () => {
      setTimeout(() => window.scrollTo(0, 0), 0);
    });
  </script>
</body>
</html>
