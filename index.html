<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Writer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    padding: 10px;
    background: #f2f2f2;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button {
    padding: 8px 12px;
    font-size: 14px;
    border: none;
    border-radius: 4px;
    background: #4caf50;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }

  .status {
    margin-left: auto;
    font-size: 12px;
    opacity: 0.7;
  }

  .editor-container {
    flex: 1;
    display: flex;
    justify-content: center;
    position: relative;
  }

  textarea {
    width: 700px;
    max-width: 90%;
    border: none;
    outline: none;
    resize: none;
    font-size: 18px;
    line-height: 1.6;
    padding: 120px 40px 40px 40px;
  }

  #overlay {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    opacity: 0.3;
    pointer-events: none;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 0.6; }
    100% { opacity: 0.2; }
  }

  .help {
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    opacity: 0.5;
  }

  /* PRINT CLEANUP */
  @media print {
    .toolbar,
    #overlay,
    .help {
      display: none;
    }

    textarea {
      width: 100%;
      padding: 0;
    }
  }
</style>
</head>

<body>

<div class="toolbar">
  <button id="downloadBtn">Download</button>
  <button id="printBtn">Print</button>
  <button id="clearBtn">Clear</button>
  <span class="status" id="status">Ready</span>
</div>

<div class="editor-container">
  <textarea id="editor" spellcheck="false"></textarea>
  <div id="overlay">Start typing...</div>

  <div class="help">
    File saves to: Files → Downloads (if used)
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
